<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        .sidebar { width: 260px; background: #2c3e50; color: white; height: 100vh; padding: 25px 20px; box-sizing: border-box; }
        .sidebar h2 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 15px; font-size: 1.3rem; }
        .sidebar ul { list-style: none; padding: 0; margin: 20px 0; }
        .sidebar ul li { padding: 12px 10px; border-radius: 4px; margin-bottom: 8px; cursor: pointer; background: #34495e; font-weight: 500; }
        .sidebar ul li:hover { background: #f39c12; }
        .main-content { flex: 1; padding: 40px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 30px; }
        .header-bar h1 { margin: 0; color: #2c3e50; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .metric-card { background: white; padding: 25px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #f39c12; }
        .metric-card h3 { margin: 0; color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        .metric-card p { margin: 10px 0 0 0; font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Management Portal</h2>
        <ul>
            <li>Dashboard Overview</li>
            <li>Admissions Log</li>
            <li>Student Rosters</li>
            <li>System Configuration</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-bar">
            <h1>Academy Control Center</h1>
            <a href="/" class="logout-btn">Secure Logout</a>
        </div>

        <div class="grid">
            <div class="metric-card">
                <h3>Active Applications</h3>
                <p>12 New Inquiries</p>
            </div>
            <div class="metric-card" style="border-left-color: #2ecc71;">
                <h3>Total Enrollment</h3>
                <p>342 Students</p>
            </div>
            <div class="metric-card" style="border-left-color: #3498db;">
                <h3>Staff Directory</h3>
                <p>24 Instructors</p>
            </div>
        </div>
    </div>

</body>
</html>
