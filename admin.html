<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal Login | Academy of Excellence</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h2 { margin-bottom: 25px; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        button { background: #f39c12; color: white; padding: 12px; border: none; border-radius: 4px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #e67e22; }
        #err-msg { color: #e74c3c; margin-top: 15px; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Admin Management Login</h2>
        <form id="adminLoginForm">
            <input type="text" id="username" placeholder="Admin Username" required>
            <input type="password" id="password" placeholder="Secure Password" required>
            <button type="submit">Access Panel</button>
            <p id="err-msg"></p>
        </form>
        <a href="/" class="back-link">← Return to Main Website</a>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errMsg = document.getElementById('err-msg');

            errMsg.innerText = "";

            const res = await fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (data.success) {
                // Secure redirect to internal dashboard panel
                window.location.href = data.redirectUrl;
            } else {
                errMsg.innerText = data.message;
            }
        });
    </script>
</body>
</html>
