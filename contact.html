<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Academy of Excellence</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: #1a252f; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { color: white; font-size: 1.4rem; font-weight: bold; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav ul li { margin-left: 20px; }
        nav ul li a { color: #fff; text-decoration: none; }
        .container { padding: 40px 20px; max-width: 500px; margin: 0 auto; background: white; margin-top: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2c3e50; color: white; border: none; cursor: pointer; font-size: 1rem; }
        button:hover { background: #34495e; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Academy of Excellence</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About Us</a></li>
            <li><a href="/academics">Academics</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Admissions & Inquiries</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="4" placeholder="How can we serve you?" required></textarea>
            <button type="submit">Submit Message</button>
            <p id="response-msg" style="text-align:center; font-weight:bold; color:green;"></p>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const responseMsg = document.getElementById('response-msg');
            
            responseMsg.innerText = "Sending...";
            const res = await fetch('/submit-contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, message })
            });
            const data = await res.json();
            if (data.success) {
                responseMsg.innerText = data.reply;
                document.getElementById('contactForm').reset();
            }
        });
    </script>
</body>
</html>
